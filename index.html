<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  padding: 16px;
}

.card {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.version {
  margin-top: 16px;
  color: #666;
  font-size: 12px;
  text-align: center;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  background: black;
  color: white;
}

.secondary {
  background: #ddd;
  color: black;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  flex-direction: column;
}

.modal.active {
  display: flex;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.modal-body {
  flex: 1;
  overflow-y: auto;
}

.list-item {
  padding: 14px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div class="card">

  <input id="value" type="number" step="0.01" placeholder="Valor (R$)">
  <input id="description" placeholder="Descricao">

  <!-- Date inline -->
  <input type="date" id="date">

  <!-- Wallet -->
  <select id="wallet">
    <option value="">Carteira</option>
  </select>

  <!-- Category -->
  <button onclick="openCategory()">Selecionar Categoria</button>
  <div id="categoryDisplay"></div>

  <button onclick="submit()">Salvar</button>

  <div class="version">Version <span id="versionLabel"></span></div>
</div>

<!-- CATEGORY MODAL -->
<div id="modal" class="modal">

  <div class="modal-header">
    <button class="secondary" onclick="goBack()"><- Voltar</button>
    <button class="secondary" onclick="closeModal()">Cancelar</button>
  </div>

  <input id="search" placeholder="Buscar..." style="margin:10px">

  <div id="list" class="modal-body"></div>

</div>

<script>
// ===== CONFIG =====
const API_URL = "YOUR_API_URL_HERE";
const SECRET_KEY = "YOUR_SECRET_KEY";
const APP_VERSION = "0.0.5";

// EDIT
const wallets = ["Conta 1", "Conta 2"];

const categories = {
  "Alimentacao": ["Restaurante", "Mercado"],
  "Transporte": ["Uber", "Combustivel"]
};

// ===== INIT =====
const walletSelect = document.getElementById("wallet");
wallets.forEach(w => {
  let o = document.createElement("option");
  o.value = w;
  o.textContent = w;
  walletSelect.appendChild(o);
});

document.getElementById("date").value =
  new Date().toISOString().split("T")[0];
document.getElementById("versionLabel").innerText = `v${APP_VERSION}`;

let currentGroup = null;
let selectedCategory = "";

// ===== CATEGORY =====
function openCategory() {
  document.getElementById("modal").classList.add("active");
  renderGroups();
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
  currentGroup = null;
}

function goBack() {
  if (currentGroup) {
    currentGroup = null;
    renderGroups();
  } else {
    closeModal();
  }
}

function renderGroups() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.keys(categories).forEach(group => {
    let div = document.createElement("div");
    div.className = "list-item";
    div.textContent = group;
    div.onclick = () => {
      currentGroup = group;
      renderItems();
    };
    list.appendChild(div);
  });
}

function renderItems() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  categories[currentGroup].forEach(item => {
    let div = document.createElement("div");
    div.className = "list-item";
    div.textContent = item;
    div.onclick = () => {
      selectedCategory = item;
      document.getElementById("categoryDisplay").innerText = item;
      closeModal();
    };
    list.appendChild(div);
  });
}

// SEARCH
document.getElementById("search").addEventListener("input", e => {
  let term = e.target.value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!term) {
    currentGroup ? renderItems() : renderGroups();
    return;
  }

  Object.entries(categories).forEach(([group, items]) => {
    items.forEach(item => {
      if (item.toLowerCase().includes(term) || group.toLowerCase().includes(term)) {
        let div = document.createElement("div");
        div.className = "list-item";
        div.textContent = `${group} -> ${item}`;
        div.onclick = () => {
          selectedCategory = item;
          document.getElementById("categoryDisplay").innerText = item;
          closeModal();
        };
        list.appendChild(div);
      }
    });
  });
});

// ===== SUBMIT =====
function submit() {
  let value = parseFloat(document.getElementById("value").value);
  let desc = document.getElementById("description").value;
  let date = document.getElementById("date").value;
  let wallet = document.getElementById("wallet").value;

  if (!value || value <= 0) return alert("Valor invalido");
  if (!desc) return alert("Descricao obrigatoria");
  if (!date) return alert("Data obrigatoria");
  if (!selectedCategory) return alert("Categoria obrigatoria");
  if (!wallet) return alert("Carteira obrigatoria");

  value = Math.round(value * 100) / 100;

  fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      key: SECRET_KEY,
      value,
      description: desc,
      date,
      category: selectedCategory,
      wallet
    })
  });

  alert("Salvo!");
}
</script>

</body>
</html>
