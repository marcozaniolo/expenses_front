// ===== INIT =====
const walletSelect = document.getElementById("wallet");
wallets.forEach(w => {
  let o = document.createElement("option");
  o.value = w;
  o.textContent = w;
  walletSelect.appendChild(o);
});

document.getElementById("date").value =
  new Date().toISOString().split("T")[0];
document.getElementById("versionLabel").innerText = `v${APP_VERSION}`;

let currentGroup = null;
let selectedCategory = "";

// ===== CATEGORY =====
function openCategory() {
  document.getElementById("modal").classList.add("active");
  renderGroups();
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
  currentGroup = null;
}

function goBack() {
  if (currentGroup) {
    currentGroup = null;
    renderGroups();
  } else {
    closeModal();
  }
}

function renderGroups() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.keys(categories).forEach(group => {
    let div = document.createElement("div");
    div.className = "list-item";
    div.textContent = group;
    div.onclick = () => {
      currentGroup = group;
      renderItems();
    };
    list.appendChild(div);
  });
}

function renderItems() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  categories[currentGroup].forEach(item => {
    let div = document.createElement("div");
    div.className = "list-item";
    div.textContent = item;
    div.onclick = () => {
      selectedCategory = item;
      document.getElementById("categoryDisplay").innerText = item;
      closeModal();
    };
    list.appendChild(div);
  });
}

// SEARCH
document.getElementById("search").addEventListener("input", e => {
  let term = e.target.value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!term) {
    currentGroup ? renderItems() : renderGroups();
    return;
  }

  Object.entries(categories).forEach(([group, items]) => {
    items.forEach(item => {
      if (item.toLowerCase().includes(term) || group.toLowerCase().includes(term)) {
        let div = document.createElement("div");
        div.className = "list-item";
        div.textContent = `${group} -> ${item}`;
        div.onclick = () => {
          selectedCategory = item;
          document.getElementById("categoryDisplay").innerText = item;
          closeModal();
        };
        list.appendChild(div);
      }
    });
  });
});

// ===== SUBMIT =====
function submit() {
  let value = parseFloat(document.getElementById("value").value);
  let desc = document.getElementById("description").value;
  let date = document.getElementById("date").value;
  let wallet = document.getElementById("wallet").value;

  if (!value || value <= 0) return alert("Valor invalido");
  if (!desc) return alert("Descricao obrigatoria");
  if (!date) return alert("Data obrigatoria");
  if (!selectedCategory) return alert("Categoria obrigatoria");
  if (!wallet) return alert("Carteira obrigatoria");

  value = Math.round(value * 100) / 100;

  fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      key: SECRET_KEY,
      value,
      description: desc,
      date,
      category: selectedCategory,
      wallet
    })
  });

  alert("Salvo!");
}
