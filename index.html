<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expenses</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  padding: 16px;
}

.card {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.version {
  margin-top: 16px;
  color: #666;
  font-size: 12px;
  text-align: center;
}

.response-box {
  margin-top: 16px;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 10px;
  background: #fafafa;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 14px;
  color: #222;
}

.response-box.error {
  border-color: #d33;
  background: #fff5f5;
  color: #a00;
}

input, select, button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font: inherit;
  font-size: 16px;
}

button {
  background: black;
  color: white;
}

.secondary {
  background: #ddd;
  color: black;
}

.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: none;
  flex-direction: column;
}

.modal.active {
  display: flex;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.modal-body {
  flex: 1;
  overflow-y: auto;
}

.list-item {
  padding: 14px;
  border-bottom: 1px solid #eee;
}
</style>
</head>

<body>

<div class="card">

  <input
    id="value"
    type="text"
    inputmode="decimal"
    autocomplete="off"
    pattern="[0-9.,]*"
    placeholder="Valor (R$)"
  >
  <input id="description" placeholder="Descricao">

  <!-- Date inline -->
  <input type="date" id="date">

  <!-- Wallet -->
  <select id="wallet">
    <option value="">Carteira</option>
  </select>

  <!-- Category -->
  <button onclick="openCategory()">Selecionar Categoria</button>
  <div id="categoryDisplay"></div>

  <button id="submitButton" onclick="submit()">Salvar</button>

  <div id="responseBox" class="response-box">A resposta do POST vai aparecer aqui.</div>

  <div class="version">Version <span id="versionLabel"></span></div>
</div>

<!-- CATEGORY MODAL -->
<div id="modal" class="modal">

  <div class="modal-header">
    <button class="secondary" onclick="goBack()"><- Voltar</button>
    <button class="secondary" onclick="closeModal()">Cancelar</button>
  </div>

  <input id="search" placeholder="Buscar..." style="margin:10px">

  <div id="list" class="modal-body"></div>

</div>

<script>
// ===== CONFIG =====
const API_URL = "https://script.google.com/macros/s/AKfycbzujFyjUlII0ialDfciz2HWUZjuyw0jBxQfVpsD5HWn_hCiHcNemKOrWIzb_DNC0Es/exec";
const SECRET_KEY = new URLSearchParams(window.location.search).get("key") || "";
const APP_VERSION = "0.0.14";

// EDIT
const wallets = ["Brad Credito", "Brad Conta", "Sant Credito", "Sant Conta", "Flash", "Splitwise"];

const categories = {
  "Alimentação": [
    "Açougue",
    "Almoço",
    "Bebidas",
    "Café/Lanches",
    "Delivery/take away",
    "Feira",
    "Guloseimas",
    "Padaria",
    "Restaurante",
    "Supermercado"
  ],

  "Animal de Estimação": [
    "Pet Shop",
    "Ração",
    "Remédio - pet",
    "Veterinário"
  ],

  "Casa": [
    "Água",
    "Alarme",
    "Aluguel",
    "Condomínio",
    "Empregada Doméstica",
    "Gás",
    "Internet",
    "Jardim",
    "Lavanderia",
    "Luz",
    "Manutenção da Casa",
    "Materiais de Limpeza",
    "Telefone",
    "TV por assinatura"
  ],

  "Crianças": [
    "Fraldas"
  ],

  "Educação": [
    "Cursos",
    "Escola",
    "Faculdade",
    "Livraria",
    "Material Escolar",
    "Pós-Graduação"
  ],

  "Gastos Esporádicos": [
    "Doações",
    "Eletrônicos",
    "Móveis e decoração",
    "Presentes",
    "Utensílios Domésticos"
  ],

  "Gastos Pessoais": [
    "Academia",
    "Acessórios",
    "Celular",
    "Corte Cabelo",
    "Dízimo",
    "Perfumaria",
    "Roupas e Calçados",
    "Salão de Beleza"
  ],

  "Impostos": [
    "FGTS",
    "INSS",
    "IOF",
    "IPTU",
    "IPVA",
    "IR"
  ],

  "Lazer": [
    "Bar/Balada",
    "Cinema/Teatro/Show",
    "Futebol",
    "Outros Esportes",
    "Passeios",
    "Viagens"
  ],

  "Receita": [
    "13º Salário",
    "Bônus",
    "Comissão",
    "Estorno",
    "Férias",
    "Honorários",
    "Juros de Investimentos",
    "Outras Receitas",
    "Reembolso",
    "Salário"
  ],

  "Saúde": [
    "Dentista",
    "Exames",
    "Farmácia",
    "Médico",
    "Plano de Saúde"
  ],

  "Seguros": [
    "Seguro de Vida",
    "Seguro do Carro",
    "Seguro Residencial"
  ],

  "Serviços": [
    "Advogado",
    "App",
    "Clube",
    "Contador"
  ],

  "Serviços Financeiros": [
    "Anuidade Cartão",
    "Consórcio",
    "Juros de Empréstimo",
    "Multas",
    "Seguro de Cartão de Crédito",
    "Tarifas bancárias",
    "Título de Capitalização"
  ],

  "Transporte": [
    "Combustível",
    "Estacionamento",
    "IPVA/licenciamento",
    "Lavagem do Carro",
    "Manutenção do Carro",
    "Metrô/Ônibus",
    "Multas de Trânsito",
    "Pedágio",
    "Táxi",
    "Transporte por App"
  ]
};

// ===== INIT =====
const walletSelect = document.getElementById("wallet");
wallets.forEach(w => {
  let o = document.createElement("option");
  o.value = w;
  o.textContent = w;
  walletSelect.appendChild(o);
});

document.getElementById("date").value =
  new Date().toISOString().split("T")[0];
document.getElementById("versionLabel").innerText = `v${APP_VERSION}`;

let currentGroup = null;
let selectedCategory = "";
const responseBox = document.getElementById("responseBox");
const valueInput = document.getElementById("value");
const submitButton = document.getElementById("submitButton");
const currencyFormatter = new Intl.NumberFormat("pt-BR", {
  minimumFractionDigits: 2,
  maximumFractionDigits: 2
});

function showResponse(message, isError = false) {
  responseBox.innerText = message;
  responseBox.classList.toggle("error", isError);
}

function applySecretKeyState() {
  if (SECRET_KEY) {
    return;
  }

  submitButton.disabled = true;
  showResponse("Link invalido: abra a pagina com ?key=SEU_SEGREDO na URL.", true);
}

function sanitizeValueInput(rawValue) {
  const cleaned = rawValue.replace(/[^\d,.\s]/g, "").replace(/\s+/g, "");
  const firstCommaIndex = cleaned.indexOf(",");

  if (firstCommaIndex === -1) {
    return cleaned;
  }

  const integerPart = cleaned.slice(0, firstCommaIndex).replace(/,/g, "");
  const decimalPart = cleaned.slice(firstCommaIndex + 1).replace(/[.,]/g, "");

  return `${integerPart},${decimalPart}`;
}

function parseLocalizedValue(rawValue) {
  const sanitized = sanitizeValueInput(rawValue);

  if (!sanitized) {
    return NaN;
  }

  const parts = sanitized.split(",");
  if (parts.length > 2) {
    return NaN;
  }

  const integerPart = (parts[0] || "").replace(/\./g, "");
  const decimalPart = parts[1] || "";
  const normalizedValue = decimalPart
    ? `${integerPart || "0"}.${decimalPart}`
    : integerPart;

  if (!/^\d+(\.\d+)?$/.test(normalizedValue)) {
    return NaN;
  }

  return Number(normalizedValue);
}

function formatLocalizedValue(value) {
  return currencyFormatter.format(value);
}

valueInput.addEventListener("input", e => {
  const sanitizedValue = sanitizeValueInput(e.target.value);

  if (e.target.value !== sanitizedValue) {
    e.target.value = sanitizedValue;
  }
});

valueInput.addEventListener("blur", e => {
  const parsedValue = parseLocalizedValue(e.target.value);

  if (!Number.isFinite(parsedValue) || parsedValue <= 0) {
    return;
  }

  e.target.value = formatLocalizedValue(parsedValue);
});

applySecretKeyState();

// ===== CATEGORY =====
function openCategory() {
  document.getElementById("modal").classList.add("active");
  renderGroups();
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
  currentGroup = null;
}

function goBack() {
  if (currentGroup) {
    currentGroup = null;
    renderGroups();
  } else {
    closeModal();
  }
}

function renderGroups() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.keys(categories).forEach(group => {
    let div = document.createElement("div");
    div.className = "list-item";
    div.textContent = group;
    div.onclick = () => {
      currentGroup = group;
      renderItems();
    };
    list.appendChild(div);
  });
}

function renderItems() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  categories[currentGroup].forEach(item => {
    let div = document.createElement("div");
    div.className = "list-item";
    div.textContent = item;
    div.onclick = () => {
      selectedCategory = item;
      document.getElementById("categoryDisplay").innerText = item;
      closeModal();
    };
    list.appendChild(div);
  });
}

// SEARCH
document.getElementById("search").addEventListener("input", e => {
  let term = e.target.value.toLowerCase();
  const list = document.getElementById("list");
  list.innerHTML = "";

  if (!term) {
    currentGroup ? renderItems() : renderGroups();
    return;
  }

  Object.entries(categories).forEach(([group, items]) => {
    items.forEach(item => {
      if (item.toLowerCase().includes(term) || group.toLowerCase().includes(term)) {
        let div = document.createElement("div");
        div.className = "list-item";
        div.textContent = `${group} -> ${item}`;
        div.onclick = () => {
          selectedCategory = item;
          document.getElementById("categoryDisplay").innerText = item;
          closeModal();
        };
        list.appendChild(div);
      }
    });
  });
});

// ===== SUBMIT =====
async function submit() {
  if (!SECRET_KEY) {
    showResponse("Link invalido: chave ausente na URL.", true);
    return;
  }

  let value = parseLocalizedValue(valueInput.value);
  let desc = document.getElementById("description").value;
  let date = document.getElementById("date").value;
  let wallet = document.getElementById("wallet").value;

  if (!value || value <= 0) return alert("Valor invalido");
  if (!desc) return alert("Descricao obrigatoria");
  if (!date) return alert("Data obrigatoria");
  if (!selectedCategory) return alert("Categoria obrigatoria");
  if (!wallet) return alert("Carteira obrigatoria");

  value = Math.round(value * 100) / 100;
  valueInput.value = formatLocalizedValue(value);

  showResponse("Enviando...");

  try {
    const payloadData = {
      key: SECRET_KEY,
      value: String(value),
      description: desc,
      date,
      category: selectedCategory,
      wallet
    };
    const payload = new URLSearchParams(payloadData);

    const response = await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      body: payload
    });

    if (response.type === "opaque" || response.ok) {
      showResponse("Transacao aceita.");
      return;
    }

    showResponse("Nao foi possivel confirmar a transacao.", true);
  } catch (error) {
    showResponse(`Falha ao enviar:\n${error.message}`, true);
  }
}
</script>

</body>
</html>
